<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель | Захід Дрон</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#0a0a0a; color:#e0e0e0; }
        header { background:#111; padding:1rem; display:flex; justify-content:space-between; align-items:center; }
        .sidebar { width:250px; background:#111; padding:1rem; height:100vh; float:left; position:fixed; overflow-y:auto; }
        .sidebar a { display:block; padding:0.8rem; color:#ddd; text-decoration:none; cursor:pointer; border-radius:8px; margin-bottom:0.3rem; }
        .sidebar a:hover { background:#2a2a2a; }
        .sidebar a.active { background:#2a2a2a; color:#fff; }
        .content { margin-left:260px; padding:1.5rem; }
        .admin-section { display:none; }
        .admin-section.active { display:block; }
        .btn { background:#2a2a2a; color:#fff; border:none; padding:0.6rem 1.2rem; border-radius:8px; cursor:pointer; margin:0.2rem; }
        .btn-danger { background:#7a2e2e; }
        input, textarea, select { width:100%; padding:0.6rem; margin:0.3rem 0; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:6px; }
        .form-group { margin-bottom:1rem; }
        .form-card { background:#111; padding:1.5rem; border-radius:12px; margin-bottom:1.5rem; border:1px solid #222; }
        .form-card h3 { margin-bottom:1rem; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:0.8rem; text-align:left; border-bottom:1px solid #333; }
        .table-container { overflow-x:auto; background:#111; border-radius:12px; padding:1rem; }
        .stat-card { background:#111; padding:1rem; border-radius:8px; margin:0.5rem; display:inline-block; min-width:150px; text-align:center; }
        .product-image { width:50px; height:50px; object-fit:cover; border-radius:6px; }
        .action-btns button { padding:0.3rem 0.6rem; margin:0.1rem; }
        .edit-btn { background:#3b82f6; }
        .delete-btn { background:#dc2626; }
    </style>
</head>
<body>
    <header>
        <h2><i class="fas fa-drone"></i> Захід Дрон - Адмін-панель</h2>
        <div><button class="btn" onclick="location.href='/'">На головну</button></div>
    </header>
    <div class="sidebar">
        <a onclick="showSection('dashboard', this)" class="active">📊 Дашборд</a>
        <a onclick="showSection('products', this)">📦 Товари</a>
        <a onclick="showSection('categories', this)">🏷️ Категорії</a>
        <a onclick="showSection('orders', this)">🛒 Замовлення</a>
        <a onclick="showSection('profile', this)">👤 Профіль</a>
    </div>
    <div class="content">
        <!-- Дашборд -->
        <div id="dashboard" class="admin-section active">
            <h2>Дашборд</h2>
            <div id="stats"></div>
            <div style="margin-top:2rem;"><h3>Останні замовлення</h3><div id="recentOrders"></div></div>
        </div>

        <!-- Товари -->
        <div id="products" class="admin-section">
            <h2>Товари</h2>
            <div class="form-card">
                <h3 id="formTitle">➕ Додати товар</h3>
                <input type="hidden" id="editId">
                <div class="form-group"><label>Назва</label><input type="text" id="productName" placeholder="Назва товару"></div>
                <div class="form-group"><label>Ціна (грн)</label><input type="number" id="productPrice" placeholder="Ціна"></div>
                <div class="form-group"><label>Категорія</label><select id="productCategory"></select></div>
                <div class="form-group"><label>Опис</label><textarea id="productDescription" rows="3" placeholder="Опис товару"></textarea></div>
                <div class="form-group"><label>Характеристики (кожен рядок)</label><textarea id="productSpecs" rows="4" placeholder="Наприклад:&#10;Потужність: 30 Вт, 50 Вт&#10;Батарея: 5000 mAh"></textarea></div>
                <div class="form-group"><label>Варіанти</label><div id="variantsContainer"><div class="variant-row" style="display:flex; gap:0.5rem; margin-bottom:0.5rem;"><input type="text" placeholder="Варіант" style="flex:1;"><button class="btn-danger" onclick="this.parentElement.remove()" style="padding:0.3rem 0.8rem;">✖</button></div></div><button class="btn" onclick="addVariantField()" style="margin-top:0.5rem;">+ Додати варіант</button></div>
                <div class="form-group"><label>Зображення</label><input type="file" id="productImage" accept="image/*"><img id="imagePreview" style="max-width:150px; margin-top:0.5rem; border-radius:8px; display:none;"></div>
                <button class="btn" id="submitBtn" onclick="submitProduct()">Додати товар</button>
                <button class="btn btn-danger" id="cancelBtn" style="display:none;" onclick="cancelEdit()">Скасувати</button>
            </div>
            <div class="table-container">
                <h3>Список товарів</h3>
                <div class="category-tabs" id="categoryTabs"></div>
                <table>
                    <thead><tr><th>Фото</th><th>Назва</th><th>Категорія</th><th>Ціна</th><th>Варіанти</th><th>Дії</th></tr></thead>
                    <tbody id="productsList"></tbody>
                </table>
            </div>
        </div>

        <!-- Категорії -->
        <div id="categories" class="admin-section">
            <h2>Категорії</h2>
            <div class="form-card"><input type="text" id="newCategory" placeholder="Назва нової категорії"><button class="btn" onclick="addCategory()">Додати категорію</button></div>
            <div class="table-container"><table><thead><tr><th>Назва</th><th>Товарів</th><th>Дії</th></tr></thead><tbody id="categoriesList"></tbody></table></div>
        </div>

        <!-- Замовлення -->
        <div id="orders" class="admin-section">
            <h2>Замовлення</h2>
            <div class="table-container"><table><thead><tr><th>ID</th><th>Товар</th><th>Ім'я</th><th>Телефон</th><th>Варіант</th><th>Дата</th></tr></thead><tbody id="ordersList"></tbody></table></div>
        </div>

        <!-- Профіль -->
        <div id="profile" class="admin-section">
            <h2>Профіль адміністратора</h2>
            <div class="form-card">
                <div class="form-group"><label>Поточний логін</label><input type="text" id="currentUsername" readonly disabled></div>
                <div class="form-group"><label>Новий логін</label><input type="text" id="newUsername" placeholder="Новий логін (необов'язково)"></div>
                <div class="form-group"><label>Поточний пароль</label><input type="password" id="currentPassword" placeholder="Поточний пароль"></div>
                <div class="form-group"><label>Новий пароль</label><input type="password" id="newPassword" placeholder="Новий пароль"></div>
                <div class="form-group"><label>Підтвердіть пароль</label><input type="password" id="confirmPassword" placeholder="Підтвердіть пароль"></div>
                <button class="btn" onclick="changePassword()">Зберегти зміни</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null, categories = [], products = [], orders = [], editId = null, currentCategory = 'all';

        async function checkAuth() {
            try {
                const res = await fetch('/api/user');
                if (!res.ok) { location.href = '/'; return false; }
                const user = await res.json();
                if (!user.isAdmin) { location.href = '/'; return false; }
                currentUser = user;
                document.getElementById('currentUsername').value = user.username;
                return true;
            } catch(e) { location.href = '/'; return false; }
        }

        function showSection(id, el) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        async function loadData() {
            if (!await checkAuth()) return;
            try {
                const [catRes, prodRes, orderRes, statsRes] = await Promise.all([
                    fetch('/api/categories'), fetch('/api/products'), fetch('/api/orders'), fetch('/api/stats')
                ]);
                categories = await catRes.json();
                products = await prodRes.json();
                orders = await orderRes.json();
                const stats = await statsRes.json();
                updateDashboard(stats);
                updateCategoriesList();
                updateProductsList();
                updateOrdersList();
                updateCategorySelect();
                updateCategoryTabs();
            } catch(e) { console.error(e); alert('Помилка завантаження даних'); }
        }

        function updateDashboard(stats) {
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><i class="fas fa-box"></i><h3>Товарів</h3><p>${stats.productsCount || products.length}</p></div>
                <div class="stat-card"><i class="fas fa-tags"></i><h3>Категорій</h3><p>${stats.categoriesCount || categories.length}</p></div>
                <div class="stat-card"><i class="fas fa-shopping-cart"></i><h3>Замовлень</h3><p>${stats.ordersCount || orders.length}</p></div>
            `;
            const recent = orders.slice(-5).reverse();
            document.getElementById('recentOrders').innerHTML = recent.map(o => {
                const p = products.find(p => p.id == o.productId);
                return `<div style="background:#111; padding:0.8rem; margin:0.5rem 0; border-radius:8px;">#${o.id} - ${p?.name || '?'} - ${o.name} - ${o.phone}</div>`;
            }).join('');
        }

        function updateCategoriesList() {
            const tbody = document.getElementById('categoriesList');
            tbody.innerHTML = categories.map(cat => {
                const cnt = products.filter(p => p.category === cat).length;
                return `<tr><td>${cat}</td><td>${cnt}</td><td><button class="delete-btn" onclick="deleteCategory('${cat}')" ${cnt > 0 ? 'disabled' : ''}><i class="fas fa-trash"></i></button></td></tr>`;
            }).join('');
        }

        function updateProductsList() {
            let filtered = products;
            if (currentCategory !== 'all') filtered = products.filter(p => p.category === currentCategory);
            const tbody = document.getElementById('productsList');
            tbody.innerHTML = filtered.map(p => `
                <tr>
                    <td><img src="${p.image || 'https://via.placeholder.com/50'}" class="product-image" onerror="this.src='https://via.placeholder.com/50'"></td>
                    <td>${escapeHtml(p.name)}</td>
                    <td>${escapeHtml(p.category)}</td>
                    <td>${p.price.toLocaleString()} грн</td>
                    <td>${p.variants.length}</td>
                    <td class="action-btns">
                        <button class="edit-btn" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function updateOrdersList() {
            const tbody = document.getElementById('ordersList');
            tbody.innerHTML = orders.sort((a,b) => new Date(b.date) - new Date(a.date)).map(o => {
                const p = products.find(p => p.id == o.productId);
                return `<tr><td>#${o.id}</td><td>${p?.name || '?'}</td><td>${o.name}</td><td>${o.phone}</td><td>${o.variant || '—'}</td><td>${new Date(o.date).toLocaleString()}</td></tr>`;
            }).join('');
        }

        function updateCategorySelect() {
            const select = document.getElementById('productCategory');
            select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function updateCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            let html = `<button class="btn ${currentCategory === 'all' ? 'active' : ''}" onclick="filterByCategory('all')" style="margin:0.2rem;">Всі</button>`;
            categories.forEach(c => {
                html += `<button class="btn ${currentCategory === c ? 'active' : ''}" onclick="filterByCategory('${c}')" style="margin:0.2rem;">${c}</button>`;
            });
            container.innerHTML = html;
        }

        function filterByCategory(c) {
            currentCategory = c;
            updateCategoryTabs();
            updateProductsList();
        }

        function addVariantField() {
            const container = document.getElementById('variantsContainer');
            const div = document.createElement('div');
            div.className = 'variant-row';
            div.style.display = 'flex';
            div.style.gap = '0.5rem';
            div.style.marginBottom = '0.5rem';
            div.innerHTML = '<input type="text" placeholder="Варіант" style="flex:1;"><button class="btn-danger" onclick="this.parentElement.remove()" style="padding:0.3rem 0.8rem;">✖</button>';
            container.appendChild(div);
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        // Категорії
        async function addCategory() {
            const cat = document.getElementById('newCategory').value.trim();
            if (!cat) { alert('Введіть назву'); return; }
            try {
                const res = await fetch('/api/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: cat })
                });
                if (res.ok) {
                    alert('Категорію додано!');
                    document.getElementById('newCategory').value = '';
                    loadData();
                } else alert('Помилка');
            } catch(e) { alert('Помилка'); }
        }

        async function deleteCategory(cat) {
            if (!confirm(`Видалити категорію "${cat}"?`)) return;
            try {
                const res = await fetch(`/api/categories/${encodeURIComponent(cat)}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('Категорію видалено!');
                    loadData();
                } else alert('Помилка');
            } catch(e) { alert('Помилка'); }
        }

        // Товари
        function editProduct(id) {
            const p = products.find(p => p.id == id);
            if (!p) return;
            editId = id;
            document.getElementById('productName').value = p.name;
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productCategory').value = p.category;
            document.getElementById('productDescription').value = p.description || '';
            document.getElementById('productSpecs').value = p.specs || '';
            const container = document.getElementById('variantsContainer');
            container.innerHTML = '';
            p.variants.forEach(v => {
                const div = document.createElement('div');
                div.className = 'variant-row';
                div.style.display = 'flex';
                div.style.gap = '0.5rem';
                div.style.marginBottom = '0.5rem';
                div.innerHTML = `<input type="text" value="${v}" placeholder="Варіант" style="flex:1;"><button class="btn-danger" onclick="this.parentElement.remove()" style="padding:0.3rem 0.8rem;">✖</button>`;
                container.appendChild(div);
            });
            document.getElementById('formTitle').innerHTML = '✏️ Редагувати товар';
            document.getElementById('submitBtn').innerHTML = 'Оновити товар';
            document.getElementById('cancelBtn').style.display = 'inline-block';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('productImage').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editId = null;
            document.getElementById('formTitle').innerHTML = '➕ Додати товар';
            document.getElementById('submitBtn').innerHTML = 'Додати товар';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('productSpecs').value = '';
            document.getElementById('variantsContainer').innerHTML = '<div class="variant-row" style="display:flex; gap:0.5rem; margin-bottom:0.5rem;"><input type="text" placeholder="Варіант" style="flex:1;"><button class="btn-danger" onclick="this.parentElement.remove()" style="padding:0.3rem 0.8rem;">✖</button></div>';
            document.getElementById('productImage').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        }

        async function submitProduct() {
            const url = editId ? `/api/products/${editId}` : '/api/products';
            const method = editId ? 'PUT' : 'POST';
            const fd = new FormData();
            fd.append('name', document.getElementById('productName').value.trim());
            fd.append('price', document.getElementById('productPrice').value);
            fd.append('category', document.getElementById('productCategory').value);
            fd.append('description', document.getElementById('productDescription').value);
            fd.append('specs', document.getElementById('productSpecs').value);
            const variants = [];
            document.querySelectorAll('#variantsContainer input').forEach(i => {
                if (i.value.trim()) variants.push(i.value.trim());
            });
            fd.append('variants', JSON.stringify(variants.length ? variants : ['Стандарт']));
            const img = document.getElementById('productImage').files[0];
            if (img) fd.append('image', img);
            try {
                console.log('Sending request to:', url, method);
                const res = await fetch(url, { method, body: fd });
                if (res.ok) {
                    alert(editId ? 'Товар оновлено!' : 'Товар додано!');
                    cancelEdit();
                    loadData();
                } else {
                    const err = await res.json();
                    alert(err.error || 'Помилка при збереженні');
                }
            } catch(e) { console.error(e); alert('Помилка з\'єднання'); }
        }

        async function deleteProduct(id) {
            if (!confirm('Видалити товар?')) return;
            try {
                const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('Товар видалено!');
                    loadData();
                } else alert('Помилка');
            } catch(e) { alert('Помилка'); }
        }

        // Зміна пароля
        async function changePassword() {
            const cur = document.getElementById('currentPassword').value;
            const newU = document.getElementById('newUsername').value;
            const newP = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;
            if (!cur) { alert('Введіть поточний пароль'); return; }
            if (newP && newP !== conf) { alert('Паролі не співпадають'); return; }
            try {
                const res = await fetch('/api/admin/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword: cur, newUsername: newU, newPassword: newP })
                });
                if (res.ok) alert('Дані оновлено!');
                else { const e = await res.json(); alert(e.error || 'Помилка'); }
            } catch(e) { alert('Помилка сервера'); }
        }

        // Preview зображення
        document.getElementById('productImage')?.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const preview = document.getElementById('imagePreview');
                preview.src = reader.result;
                preview.style.display = 'block';
            };
            if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
