<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Захід Дрон | Магазин дронів та реб</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            color: #e0e0e0;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }
        /* Паралакс фон */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0a0a0a;
        }
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.12;
            transform: translateY(0);
            transition: transform 0.1s linear;
        }
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            pointer-events: none;
            transition: background 0.05s linear;
        }
        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { height: 40px; width: auto; border-radius: 8px; background: #fff; padding: 2px; }
        .logo-text .top { font-size: 0.85rem; font-weight: 600; color: #aaa; letter-spacing: 0.5px; }
        .logo-text .bottom { font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: 1px; }
        .logo-text .ua { font-size: 0.7rem; color: #777; }
        .desktop-nav { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .desktop-nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.2s;
            position: relative;
        }
        .desktop-nav a:hover, .desktop-nav a.active { color: #fff; }
        .desktop-nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #fff;
            transition: width 0.2s;
        }
        .desktop-nav a:hover::after, .desktop-nav a.active::after { width: 100%; }
        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .auth-buttons button, .user-menu {
            background: transparent;
            border: 1px solid #3a3a3a;
            color: #ccc;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-buttons button:hover { background: #3a3a3a; color: #fff; border-color: #3a3a3a; }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-name {
            color: #fff;
            font-weight: 600;
        }
        .logout-btn {
            background: #2a2a2a;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
        }
        .logout-btn:hover { background: #3a3a3a; }
        .admin-link {
            background: #5a2e2e;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
        }
        /* Mobile menu */
        .mobile-menu-toggle { display: none; font-size: 1.6rem; color: #fff; cursor: pointer; }
        .mobile-nav {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100vh;
            background: #0f0f0f; z-index: 200; padding: 2rem 1.5rem;
            transition: left 0.3s ease; box-shadow: 2px 0 20px rgba(0,0,0,0.5);
        }
        .mobile-nav.active { left: 0; }
        .mobile-nav-header {
            display: flex; justify-content: space-between; margin-bottom: 2rem;
            border-bottom: 1px solid #222; padding-bottom: 1rem;
        }
        .mobile-nav-close { font-size: 1.8rem; cursor: pointer; color: #fff; }
        .mobile-nav a { display: block; padding: 1rem 0; color: #ddd; text-decoration: none; border-bottom: 1px solid #1a1a1a; }
        .mobile-nav-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 150; display: none; backdrop-filter: blur(4px);
        }
        .mobile-nav-overlay.active { display: block; }
        /* Основний контент */
        main { flex: 1; padding: 3rem 5%; max-width: 1400px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 1rem; color: #fff; }
        h2 { font-size: 1.6rem; font-weight: 600; margin: 2rem 0 1rem; color: #fff; }
        /* Каталог (класичний) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .product-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-6px);
            border-color: #444;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }
        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #1a1a1a;
            transition: transform 0.4s;
        }
        .product-card:hover .product-image { transform: scale(1.02); }
        .product-info { padding: 1.2rem; }
        .product-info h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
        .product-price { font-size: 1.3rem; font-weight: 700; color: #aaa; margin: 0.5rem 0; }
        .product-category {
            font-size: 0.75rem; color: #777; background: #1a1a1a;
            display: inline-block; padding: 0.2rem 0.8rem; border-radius: 20px;
        }
        .order-btn-small {
            background: #2a2a2a; border: none; color: #fff; width: 100%;
            padding: 0.7rem; border-radius: 40px; font-weight: 600;
            margin-top: 1rem; cursor: pointer; transition: 0.2s;
        }
        .order-btn-small:hover { background: #3a3a3a; transform: translateY(-2px); }
        /* Сучасна сітка (3D flip) */
        .products-grid-modern {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .product-card-modern { perspective: 1000px; cursor: pointer; height: 350px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d;
            border-radius: 20px;
        }
        .product-card-modern:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            background: #111; border: 1px solid #222; overflow: hidden;
        }
        .card-front { display: flex; align-items: center; justify-content: center; }
        .card-back {
            transform: rotateY(180deg); padding: 1.5rem;
            display: flex; flex-direction: column; justify-content: center; text-align: center;
        }
        .product-image-modern { width: 100%; height: 100%; object-fit: cover; }
        /* Слайдер */
        .slider-container {
            position: relative; margin: 2rem 0; padding: 0 40px;
        }
        .slider-wrapper { overflow: hidden; }
        .slider-track { display: flex; transition: transform 0.3s ease; }
        .slider-slide { flex: 0 0 calc(100% / 3); padding: 0 10px; }
        @media (max-width: 1024px) { .slider-slide { flex: 0 0 50%; } }
        @media (max-width: 768px) { .slider-slide { flex: 0 0 100%; } }
        .product-card-slider {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 1rem; text-align: center; transition: 0.2s; height: 100%;
        }
        .product-card-slider:hover { transform: translateY(-5px); border-color: #444; }
        .product-image-slider { width: 100%; height: 180px; object-fit: contain; margin-bottom: 1rem; }
        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); border: none; width: 40px; height: 40px;
            border-radius: 50%; color: white; cursor: pointer; z-index: 5;
        }
        .slider-btn:hover { background: #3a3a3a; }
        .slider-btn.prev { left: 0; }
        .slider-btn.next { right: 0; }
        /* Банер та бренд-лого */
        .hero-banner { width: 100%; border-radius: 24px; overflow: hidden; margin-bottom: 2rem; }
        .hero-banner img { width: 100%; height: auto; max-height: 400px; object-fit: cover; }
        .brand-logo-container { text-align: center; margin: 2rem auto; }
        .brand-logo-container img { max-width: 400px; width: 100%; border-radius: 16px; transition: transform 0.2s; }
        /* Відгуки */
        .reviews-section {
            margin: 3rem 0;
            background: #111;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 2rem;
        }
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .review-card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 1.2rem;
            transition: 0.2s;
        }
        .review-card:hover { border-color: #444; transform: translateY(-3px); }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #222;
        }
        .review-author { font-weight: 700; color: #fff; }
        .review-date { font-size: 0.75rem; color: #777; }
        .review-rating { color: #ffc107; margin-bottom: 0.8rem; font-size: 0.9rem; }
        .review-text { color: #bbb; line-height: 1.5; font-size: 0.9rem; }
        .add-review {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #222;
        }
        .add-review h3 { margin-bottom: 1rem; color: #fff; }
        .review-form input, .review-form textarea, .review-form select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            color: #fff;
        }
        .review-form button {
            background: #2a2a2a;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .review-form button:hover { background: #3a3a3a; transform: translateY(-2px); }
        /* Новий дизайн сторінки товару (як на скріншоті) */
        .product-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background: #111;
            border: 1px solid #222;
            border-radius: 28px;
            padding: 2rem;
        }
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .main-image {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }
        .main-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; cursor: pointer; }
        .thumbnail-list {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.7;
            transition: 0.2s;
        }
        .thumbnail.active { border-color: #aaa; opacity: 1; }
        .product-info-new {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .product-title {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            border-left: 4px solid #5a5a5a;
            padding-left: 1rem;
        }
        .product-price-new {
            font-size: 1.8rem;
            font-weight: 700;
            color: #aaa;
        }
        .specs-list {
            background: #0a0a0a;
            border-radius: 20px;
            padding: 1rem;
            margin: 0.5rem 0;
        }
        .spec-item {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #222;
            font-size: 0.95rem;
        }
        .spec-item strong {
            min-width: 140px;
            color: #aaa;
            font-weight: 500;
        }
        .spec-item span {
            color: #ddd;
        }
        .battery-stack {
            background: #0a0a0a;
            border-radius: 20px;
            padding: 1rem;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .battery-item, .stack-item {
            flex: 1;
            text-align: center;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 0.8rem;
        }
        .battery-item h4, .stack-item h4 {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 0.3rem;
        }
        .battery-item p, .stack-item p {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }
        .variant-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .variant-btn-new {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }
        .variant-btn-new:hover, .variant-btn-new.active {
            background: #3a3a3a;
            border-color: #3a3a3a;
            color: #fff;
        }
        .buy-section {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 1.5rem;
            position: sticky;
            top: 100px;
        }
        .buy-price {
            font-size: 1.6rem;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 1rem;
        }
        .buy-form input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            color: #fff;
        }
        .buy-btn {
            background: #2a2a2a;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .buy-btn:hover { background: #3a3a3a; transform: translateY(-2px); }
        .product-tabs {
            margin-top: 1rem;
            border-top: 1px solid #222;
            padding-top: 1rem;
        }
        .tabs-header {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 1rem;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active { color: #fff; border-bottom: 2px solid #aaa; }
        .tab-content { display: none; color: #bbb; line-height: 1.6; }
        .tab-content.active { display: block; }
        /* Про нас / Контакти */
        .about-hero {
            text-align: center; padding: 3rem 2rem; background: #111;
            border-radius: 28px; margin-bottom: 2rem; border: 1px solid #222;
        }
        .about-hero h1 { font-size: 2.5rem; }
        .about-hero p { color: #aaa; max-width: 600px; margin: 1rem auto 0; }
        .about-content {
            background: #111; border: 1px solid #222; border-radius: 24px;
            padding: 2rem; line-height: 1.7;
        }
        .about-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .feature-item {
            background: #0a0a0a; border: 1px solid #222; border-radius: 20px;
            padding: 1.5rem; text-align: center; transition: 0.2s;
        }
        .feature-item:hover { border-color: #444; transform: translateY(-3px); }
        .feature-item i { font-size: 2rem; color: #aaa; margin-bottom: 1rem; }
        .contact-content {
            background: #111; border: 1px solid #222; border-radius: 24px; padding: 2rem;
        }
        .contact-info { display: flex; flex-direction: column; gap: 1rem; }
        .contact-item {
            display: flex; align-items: center; gap: 1rem; padding: 1rem;
            background: #0a0a0a; border-radius: 16px; transition: 0.2s;
        }
        .contact-item:hover { background: #151515; }
        .social-section { margin-top: 2rem; }
        .social-links { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }
        .social-link {
            background: #1a1a1a; padding: 0.5rem 1.2rem; border-radius: 40px;
            text-decoration: none; color: #ddd; display: inline-flex; align-items: center;
            gap: 8px; transition: 0.2s;
        }
        .social-link:hover { background: #3a3a3a; color: #fff; transform: translateY(-2px); }
        footer {
            background: #0a0a0a; border-top: 1px solid #1a1a1a;
            text-align: center; padding: 1.5rem; font-size: 0.85rem; color: #777;
        }
        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            align-items: flex-end; justify-content: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111; padding: 2rem; border-radius: 30px 30px 0 0;
            width: 100%; max-width: 500px; animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-content h2 { margin-bottom: 1.5rem; color: #fff; }
        .modal-content input {
            width: 100%; padding: 0.9rem; margin-bottom: 1rem;
            background: #1a1a1a; border: 1px solid #333; border-radius: 16px; color: #fff;
        }
        .modal-content button {
            background: #2a2a2a; width: 100%; padding: 0.9rem; border: none;
            border-radius: 40px; font-weight: 600; color: #fff; cursor: pointer;
        }
        .close { float: right; font-size: 1.8rem; cursor: pointer; color: #aaa; }
        /* Адаптивність */
        @media (max-width: 992px) {
            .product-page { grid-template-columns: 1fr; }
            .buy-section { position: static; margin-top: 1rem; }
            .product-info-new { text-align: center; }
            .variant-buttons { justify-content: center; }
            .spec-item { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
            .spec-item strong { min-width: auto; }
        }
        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .mobile-menu-toggle { display: block; }
            .products-grid, .products-grid-modern { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .brand-logo-container img { max-width: 250px; }
            main { padding: 1.5rem; }
            .reviews-grid { grid-template-columns: 1fr; }
            .thumbnail { width: 60px; height: 60px; }
            .product-page { padding: 1rem; }
            .product-title { font-size: 1.5rem; }
            .product-price-new { font-size: 1.4rem; }
            .buy-price { font-size: 1.3rem; }
            .battery-stack { flex-direction: column; }
        }
        @media (max-width: 480px) {
            .products-grid, .products-grid-modern { grid-template-columns: 1fr; }
            .auth-buttons button span { display: none; }
            .auth-buttons button i { margin: 0; }
            .user-menu .user-name { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-container" id="bgContainer">
        <img src="" alt="Фон" class="bg-image" id="bgImage" style="display: none;">
        <div class="bg-overlay" id="bgOverlay"></div>
    </div>
    <header>
        <div class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></div>
        <a href="/" class="logo">
            <img src="" alt="Логотип" class="logo-img" id="headerLogo" style="display: none;">
            <div class="logo-text">
                <span class="top">ЗАХІД</span>
                <span class="bottom">ДРОН</span>
                <span class="ua">UA</span>
            </div>
        </a>
        <nav class="desktop-nav">
            <a href="/">Головна</a>
            <a href="/catalog">Каталог</a>
            <a href="/reviews">Відгуки</a>
            <a href="/about">Про нас</a>
            <a href="/contacts">Контакти</a>
        </nav>
        <div class="auth-buttons" id="authButtons"></div>
    </header>
    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
    <div class="mobile-nav" id="mobileNav">
        <div class="mobile-nav-header">
            <img src="" alt="Логотип" class="logo-img" id="mobileLogo" style="display: none;">
            <span class="mobile-nav-close" id="mobileNavClose">&times;</span>
        </div>
        <a href="/">Головна</a>
        <a href="/catalog">Каталог</a>
        <a href="/reviews">Відгуки</a>
        <a href="/about">Про нас</a>
        <a href="/contacts">Контакти</a>
    </div>
    <main id="main-content"></main>
    <footer><p>© 2025 Захід Дрон. Всі права захищені.</p></footer>

    <div id="loginModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('loginModal')">&times;</span><h2>Вхід</h2><input type="text" id="loginUsername" placeholder="Логін"><input type="password" id="loginPassword" placeholder="Пароль"><button onclick="login()">Увійти</button></div></div>
    <div id="registerModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('registerModal')">&times;</span><h2>Реєстрація</h2><input type="text" id="regUsername" placeholder="Логін"><input type="password" id="regPassword" placeholder="Пароль"><button onclick="register()">Зареєструватися</button></div></div>

    <script>
        let currentUser = null, categories = [], products = [], aboutText = '', contactInfo = '', socialLinks = [], reviews = [], bannerImage = '', brandLogoImage = '', backgroundImage = '', currentDisplayStyle = 'classic';
        let currentSlideIndex = 0, slidesPerView = 3, totalSlides = 0;

        function initMobileMenu() {
            const toggle = document.getElementById('mobileMenuToggle');
            const close = document.getElementById('mobileNavClose');
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            if (!toggle || !close || !nav || !overlay) return;
            function open() { nav.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
            function closeMenu() { nav.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
            toggle.addEventListener('click', e => { e.stopPropagation(); open(); });
            close.addEventListener('click', closeMenu);
            overlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.mobile-nav a').forEach(l => l.addEventListener('click', closeMenu));
            nav.addEventListener('click', e => e.stopPropagation());
        }

        function initParallax() {
            const bgImage = document.getElementById('bgImage');
            const bgOverlay = document.getElementById('bgOverlay');
            window.addEventListener('scroll', () => {
                if (bgImage && bgImage.style.display !== 'none') {
                    const scrollY = window.scrollY;
                    bgImage.style.transform = `translateY(${scrollY * 0.2}px)`;
                    if (bgOverlay) {
                        let opacity = Math.min(scrollY / 500, 0.5);
                        bgOverlay.style.backgroundColor = `rgba(0,0,0,${opacity})`;
                    }
                }
            });
        }

        async function loadSettings() {
            try { const res = await fetch('/api/settings'); const s = await res.json(); currentDisplayStyle = s.product_display_style || 'classic'; } catch(e) { currentDisplayStyle = 'classic'; }
        }
        async function loadLogo() { try { const r = await fetch('/api/logo'); if(r.ok){ const url = await r.text(); if(url){ document.getElementById('headerLogo').src = url; document.getElementById('headerLogo').style.display = 'block'; document.getElementById('mobileLogo').src = url; document.getElementById('mobileLogo').style.display = 'block'; } } } catch(e){} }
        async function loadBanner() { try { const r = await fetch('/api/banner'); if(r.ok){ const url = await r.text(); if(url) bannerImage = url; } } catch(e){} }
        async function loadBrandLogo() { try { const r = await fetch('/api/brand-logo'); if(r.ok){ const url = await r.text(); if(url) brandLogoImage = url; } } catch(e){} }
        async function loadBackground() { try { const r = await fetch('/api/background'); if(r.ok){ const url = await r.text(); if(url){ backgroundImage = url; document.getElementById('bgImage').src = url; document.getElementById('bgImage').style.display = 'block'; } } } catch(e){} }
        async function loadReviews() { try { const r = await fetch('/api/reviews'); if(r.ok){ reviews = await r.json(); } } catch(e){ reviews = []; } }

        async function loadData() {
            try {
                const [cRes, pRes, aRes, coRes, uRes, sRes] = await Promise.all([
                    fetch('/api/categories'), fetch('/api/products'), fetch('/api/about'), fetch('/api/contact'),
                    fetch('/api/user').catch(()=>null), fetch('/api/social').catch(()=>({json:()=>[]}))
                ]);
                categories = await cRes.json();
                products = await pRes.json();
                aboutText = await aRes.text();
                contactInfo = await coRes.text();
                socialLinks = await sRes.json();
                if(uRes && uRes.ok) currentUser = await uRes.json();
                await loadLogo(); await loadBanner(); await loadBrandLogo(); await loadBackground();
                await loadSettings();
                await loadReviews();
                updateAuthUI();
            } catch(e){ console.error(e); }
        }

        function updateAuthUI() {
            const container = document.getElementById('authButtons');
            if (!container) return;
            if (currentUser) {
                container.innerHTML = `
                    <div class="user-menu">
                        <span class="user-name"><i class="fas fa-user-circle"></i> ${currentUser.username}</span>
                        ${currentUser.isAdmin ? '<a href="/admin" class="admin-link">Admin</a>' : ''}
                        <button class="logout-btn" onclick="logout()">Вийти</button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> <span>Вхід</span></button>
                    <button id="registerBtn"><i class="fas fa-user-plus"></i> <span>Реєстрація</span></button>
                `;
                document.getElementById('loginBtn')?.addEventListener('click', () => document.getElementById('loginModal').classList.add('active'));
                document.getElementById('registerBtn')?.addEventListener('click', () => document.getElementById('registerModal').classList.add('active'));
            }
        }

        async function renderPage() {
            await loadData();
            const path = window.location.pathname;
            const main = document.getElementById('main-content');
            document.querySelectorAll('.desktop-nav a, .mobile-nav a').forEach(link => {
                link.classList.remove('active');
                if(link.getAttribute('href') === path || (path === '/' && link.getAttribute('href') === '/about')) link.classList.add('active');
            });
            if(path === '/' || path === '/about') renderAbout(main);
            else if(path === '/catalog') renderCatalog(main);
            else if(path === '/reviews') renderReviews(main);
            else if(path === '/contacts') renderContacts(main);
            else if(path.startsWith('/product/')) renderProductPage(main, path.split('/')[2]);
        }

        function renderAbout(main) {
            const bannerHtml = bannerImage ? `<div class="hero-banner"><img src="${bannerImage}" alt="Банер"></div>` : '';
            const brandHtml = brandLogoImage ? `<div class="brand-logo-container"><img src="${brandLogoImage}" alt="Бренд-лого"></div>` : '';
            main.innerHTML = `
                ${bannerHtml}
                ${brandHtml}
                <div class="about-hero"><h1>Про нас</h1><p>Ваш надійний партнер у світі дронів та комплектуючих</p></div>
                <div class="about-content">${aboutText.replace(/\n/g, '<br>')}</div>
                <div class="about-features">
                    <div class="feature-item"><i class="fas fa-shield-alt"></i><h3>Гарантія якості</h3><p>Всі товари мають офіційну гарантію</p></div>
                    <div class="feature-item"><i class="fas fa-headset"></i><h3>Підтримка 24/7</h3><p>Завжди готові допомогти з вибором</p></div>
                </div>
                <div class="social-section"><h3>Ми в соціальних мережах</h3><div class="social-links">${socialLinks.map(s => `<a href="${s.url}" target="_blank" class="social-link"><i class="${s.icon}"></i> ${s.name}</a>`).join('')}</div></div>
            `;
        }

        function renderCatalog(main) {
            let html = '<h1>Каталог товарів</h1>';
            if (!products.length) { html += '<p style="text-align:center;padding:3rem;">Товари поки відсутні</p>'; main.innerHTML = html; return; }
            if (currentDisplayStyle === 'slider') {
                html += '<div class="slider-container"><button class="slider-btn prev" onclick="slideProducts(-1)"><i class="fas fa-chevron-left"></i></button><div class="slider-wrapper"><div class="slider-track" id="sliderTrack">';
                products.forEach(p => {
                    html += `<div class="slider-slide"><div class="product-card-slider" data-id="${p.id}"><img src="${p.image || 'data:image/svg+xml,%3Csvg...%3E'}" class="product-image-slider"><h3>${p.name}</h3><div class="product-price">${p.price.toLocaleString()} грн</div><span class="product-category">${p.category}</span><button class="order-btn-small" onclick="event.stopPropagation(); location.href='/product/${p.id}'">Детальніше</button></div></div>`;
                });
                html += '</div></div><button class="slider-btn next" onclick="slideProducts(1)"><i class="fas fa-chevron-right"></i></button></div>';
                main.innerHTML = html; initSlider();
                document.querySelectorAll('.product-card-slider').forEach(c => c.addEventListener('click', e => { const id = c.getAttribute('data-id'); if(id) location.href = `/product/${id}`; }));
            } else if (currentDisplayStyle === 'modern') {
                categories.forEach(cat => {
                    const catProds = products.filter(p => p.category === cat);
                    if (catProds.length) {
                        html += `<h2>${cat}</h2><div class="products-grid-modern">`;
                        catProds.forEach(p => {
                            html += `<div class="product-card-modern" data-id="${p.id}"><div class="card-inner"><div class="card-front"><img src="${p.image || 'data:image/svg+xml,%3Csvg...%3E'}" class="product-image-modern"></div><div class="card-back"><h3>${p.name}</h3><div class="product-price">${p.price.toLocaleString()} грн</div><span class="product-category">${p.category}</span><button class="order-btn-small" onclick="event.stopPropagation(); location.href='/product/${p.id}'">Детальніше</button></div></div></div>`;
                        });
                        html += '</div>';
                    }
                });
                main.innerHTML = html;
                document.querySelectorAll('.product-card-modern').forEach(c => c.addEventListener('click', e => { const id = c.getAttribute('data-id'); if(id) location.href = `/product/${id}`; }));
            } else {
                categories.forEach(cat => {
                    const catProds = products.filter(p => p.category === cat);
                    if (catProds.length) {
                        html += `<h2>${cat}</h2><div class="products-grid">`;
                        catProds.forEach(p => {
                            html += `<div class="product-card" data-id="${p.id}"><img src="${p.image || 'data:image/svg+xml,%3Csvg...%3E'}" class="product-image"><div class="product-info"><h3>${p.name}</h3><div class="product-price">${p.price.toLocaleString()} грн</div><span class="product-category">${p.category}</span><button class="order-btn-small" onclick="event.stopPropagation(); location.href='/product/${p.id}'">Детальніше</button></div></div>`;
                        });
                        html += '</div>';
                    }
                });
                main.innerHTML = html;
                document.querySelectorAll('.product-card').forEach(c => c.addEventListener('click', e => { const id = c.getAttribute('data-id'); if(id) location.href = `/product/${id}`; }));
            }
        }

        function renderReviews(main) {
            const stars = (rating) => '★'.repeat(rating) + '☆'.repeat(5-rating);
            const reviewsHtml = reviews.length ? reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <span class="review-author">${r.author}</span>
                        <span class="review-date">${new Date(r.date).toLocaleDateString('uk-UA')}</span>
                    </div>
                    <div class="review-rating">${stars(r.rating)}</div>
                    <div class="review-text">${r.text}</div>
                </div>
            `).join('') : '<p style="text-align:center;padding:2rem;">Ще немає відгуків. Будьте першим!</p>';
            
            main.innerHTML = `
                <h1>Відгуки наших клієнтів</h1>
                <div class="reviews-section">
                    <div class="reviews-grid" id="reviewsList">${reviewsHtml}</div>
                    ${currentUser ? `
                        <div class="add-review">
                            <h3>Залишити відгук</h3>
                            <form class="review-form" onsubmit="event.preventDefault(); addReview()">
                                <input type="text" id="reviewAuthor" placeholder="Ваше ім'я" value="${currentUser.username}" required>
                                <select id="reviewRating" required>
                                    <option value="5">★★★★★ (5)</option>
                                    <option value="4">★★★★☆ (4)</option>
                                    <option value="3">★★★☆☆ (3)</option>
                                    <option value="2">★★☆☆☆ (2)</option>
                                    <option value="1">★☆☆☆☆ (1)</option>
                                </select>
                                <textarea id="reviewText" rows="4" placeholder="Ваш відгук..." required></textarea>
                                <button type="submit">Залишити відгук</button>
                            </form>
                        </div>
                    ` : '<p style="text-align:center;margin-top:2rem;"><a href="#" onclick="document.getElementById(\'loginModal\').classList.add(\'active\')">Увійдіть</a>, щоб залишити відгук</p>'}
                </div>
            `;
        }

        window.addReview = async function() {
            const author = document.getElementById('reviewAuthor').value;
            const rating = parseInt(document.getElementById('reviewRating').value);
            const text = document.getElementById('reviewText').value;
            if(!author || !text) { alert('Заповніть всі поля'); return; }
            const res = await fetch('/api/reviews', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ author, rating, text })
            });
            if(res.ok) {
                alert('Дякуємо за відгук!');
                renderReviews(document.getElementById('main-content'));
            } else alert('Помилка при додаванні відгуку');
        };

        function renderContacts(main) {
            const lines = contactInfo.split('\n');
            main.innerHTML = `<h1>Контакти</h1><div class="contact-content"><div class="contact-info">${lines.map(l => {
                if(l.includes('@')) return `<div class="contact-item"><i class="fas fa-envelope"></i><div><h3>Email</h3><p>${l.replace('Email:','').trim()}</p></div></div>`;
                if(l.includes('+380')||l.includes('Телефон')) return `<div class="contact-item"><i class="fas fa-phone"></i><div><h3>Телефон</h3><p>${l.replace('Телефон:','').trim()}</p></div></div>`;
                if(l.includes('Графік')) return `<div class="contact-item"><i class="fas fa-clock"></i><div><h3>Графік</h3><p>${l.replace('Графік:','').trim()}</p></div></div>`;
                if(l.includes('Адреса')) return `<div class="contact-item"><i class="fas fa-map-marker-alt"></i><div><h3>Адреса</h3><p>${l.replace('Адреса:','').trim()}</p></div></div>`;
                return '';
            }).join('')}</div><div class="social-section"><h3>Напишіть нам</h3><div class="social-links">${socialLinks.map(s => `<a href="${s.url}" target="_blank" class="social-link"><i class="${s.icon}"></i> ${s.name}</a>`).join('')}</div></div></div>`;
        }

        function renderProductPage(main, id) {
            const p = products.find(p => p.id == id);
            if(!p){ main.innerHTML = '<h1>Товар не знайдено</h1>'; return; }
            const defaultImage = p.image || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22600%22 viewBox=%220 0 600 600%22%3E%3Crect width=%22600%22 height=%22600%22 fill=%22#1a1a1a%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22#666%22 font-size=%2224%22%3EНемає фото%3C/text%3E%3C/svg%3E';
            const variantsHtml = p.variants.map(v => `<button class="variant-btn-new" data-variant="${v}">${v}</button>`).join('');
            // Розбираємо характеристики (specs) на масив рядків
            let specsHtml = '';
            let batteryHtml = '';
            let stackHtml = '';
            if (p.specs) {
                const lines = p.specs.split('\n');
                const specItems = [];
                let batteryValue = '';
                let stackValue = '';
                for (let line of lines) {
                    if (line.toLowerCase().includes('батарея') || line.toLowerCase().includes('акумулятор')) {
                        batteryValue = line.replace(/.*?:/i, '').trim();
                    } else if (line.toLowerCase().includes('стек') || line.toLowerCase().includes('політний')) {
                        stackValue = line.replace(/.*?:/i, '').trim();
                    } else if (line.includes(':')) {
                        const [key, val] = line.split(':');
                        specItems.push(`<div class="spec-item"><strong>${key.trim()}</strong><span>${val.trim()}</span></div>`);
                    } else if (line.trim()) {
                        specItems.push(`<div class="spec-item"><strong>•</strong><span>${line.trim()}</span></div>`);
                    }
                }
                specsHtml = specItems.join('');
                if (batteryValue || stackValue) {
                    batteryHtml = `<div class="battery-item"><h4>БАТАРЕЯ</h4><p>${batteryValue || '—'}</p></div>`;
                    stackHtml = `<div class="stack-item"><h4>ПОЛІТНИЙ СТЕК</h4><p>${stackValue || '—'}</p></div>`;
                }
            } else {
                specsHtml = '<div class="spec-item"><span>Характеристики не додані</span></div>';
            }
            // Якщо батарея/стек не знайдені в specs, можна спробувати взяти з окремих полів (поки немає)
            const batteryStackHtml = (batteryHtml || stackHtml) ? `<div class="battery-stack">${batteryHtml}${stackHtml}</div>` : '';
            
            main.innerHTML = `
                <div class="product-page">
                    <div class="product-gallery">
                        <div class="main-image"><img src="${defaultImage}" alt="${p.name}" id="mainProductImage"></div>
                        <div class="thumbnail-list"><div class="thumbnail active"><img src="${defaultImage}" alt="Фото"></div></div>
                    </div>
                    <div class="product-info-new">
                        <h1 class="product-title">${p.name}</h1>
                        <div class="product-price-new">${p.price.toLocaleString()} грн</div>
                        <div class="specs-list">${specsHtml}</div>
                        ${batteryStackHtml}
                        <div class="variants-section"><h3>Варіанти:</h3><div class="variant-buttons" id="variantButtons">${variantsHtml}</div></div>
                        <div class="buy-section">
                            <div class="buy-price">${p.price.toLocaleString()} грн</div>
                            <div class="buy-form">
                                <input type="text" id="orderNameProduct" placeholder="Ваше ім'я">
                                <input type="tel" id="orderPhoneProduct" placeholder="Номер телефону">
                                <input type="text" id="orderVariantProduct" placeholder="Оберіть варіант" readonly>
                                <button class="buy-btn" onclick="placeOrderProduct(${p.id})">Купити</button>
                            </div>
                        </div>
                        <div class="product-tabs">
                            <div class="tabs-header">
                                <button class="tab-btn active" data-tab="desc">Опис</button>
                                <button class="tab-btn" data-tab="specs">Характеристики</button>
                                <button class="tab-btn" data-tab="delivery">Доставка</button>
                            </div>
                            <div class="tab-content active" id="tab-desc">${p.description || 'Опис відсутній'}</div>
                            <div class="tab-content" id="tab-specs">${p.specs ? p.specs.replace(/\n/g, '<br>') : 'Не додано'}</div>
                            <div class="tab-content" id="tab-delivery">Доставка по всій Україні протягом 1-3 днів. Самовивіз з м. Львів.</div>
                        </div>
                    </div>
                </div>
            `;
            // Обробники подій
            document.querySelectorAll('.variant-btn-new').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.variant-btn-new').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('orderVariantProduct').value = btn.getAttribute('data-variant');
                });
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.getAttribute('data-tab');
                    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                    document.getElementById(`tab-${tabId}`).classList.add('active');
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        }

        window.placeOrderProduct = async (id) => {
            const name = document.getElementById('orderNameProduct').value;
            const phone = document.getElementById('orderPhoneProduct').value;
            const variant = document.getElementById('orderVariantProduct').value;
            if(!name || !phone || !variant) { alert('Заповніть всі поля та оберіть варіант'); return; }
            const res = await fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ productId: id, name, phone, variant }) });
            if(res.ok) { alert('Дякуємо! Замовлення прийнято.'); location.href = '/'; } else alert('Помилка');
        };

        function initSlider() { const track = document.getElementById('sliderTrack'); if(track){ totalSlides = track.children.length; updateSlidesPerView(); window.addEventListener('resize', updateSlidesPerView); } }
        function updateSlidesPerView() { if (window.innerWidth < 768) slidesPerView = 1; else if (window.innerWidth < 1024) slidesPerView = 2; else slidesPerView = 3; updateSlider(); }
        function updateSlider() { const track = document.getElementById('sliderTrack'); if(!track) return; const slideWidth = track.children[0]?.offsetWidth || 0; track.style.transform = `translateX(${-currentSlideIndex * slideWidth}px)`; const prev = document.querySelector('.slider-btn.prev'); const next = document.querySelector('.slider-btn.next'); if(prev) prev.style.display = currentSlideIndex <= 0 ? 'none' : 'flex'; if(next) next.style.display = currentSlideIndex >= totalSlides - slidesPerView ? 'none' : 'flex'; }
        window.slideProducts = function(direction) { const track = document.getElementById('sliderTrack'); if(!track) return; totalSlides = track.children.length; const maxIndex = totalSlides - slidesPerView; let newIndex = currentSlideIndex + direction; if(newIndex < 0) newIndex = 0; if(newIndex > maxIndex) newIndex = maxIndex; if(newIndex !== currentSlideIndex) { currentSlideIndex = newIndex; updateSlider(); } };

        window.login = async () => {
            const u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            if(res.ok){ const user=await res.json(); currentUser=user; closeModal('loginModal'); updateAuthUI(); window.location.reload(); }
            else alert('Невірний логін або пароль');
        };
        window.register = async () => {
            const u = document.getElementById('regUsername').value, p = document.getElementById('regPassword').value;
            if(!u||!p) return alert('Заповніть всі поля');
            const res = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            if(res.ok){ alert('Реєстрація успішна! Увійдіть.'); closeModal('registerModal'); }
            else alert('Користувач вже існує');
        };
        window.logout = async () => {
            await fetch('/api/logout', { method: 'POST' });
            currentUser = null;
            updateAuthUI();
            window.location.href = '/';
        };
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.addEventListener('popstate', renderPage);
        document.querySelectorAll('.desktop-nav a, .mobile-nav a').forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); const href = link.getAttribute('href'); history.pushState({},'',href); renderPage(); }));
        document.addEventListener('DOMContentLoaded', () => { initMobileMenu(); initParallax(); renderPage(); });
        renderPage();
    </script>
</body>
</html>
