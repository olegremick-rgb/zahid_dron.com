<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Захід Дрон | Магазин дронів та реб</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root { --primary:#1a1a1a; --secondary:#2d2d2d; --accent:#6c6c6c; --accent-light:#8a8a8a; --light:#e5e5e5; --white:#ffffff; --text:#f0f0f0; --shadow:0 4px 12px rgba(0,0,0,0.3); --gradient:linear-gradient(135deg,#1a1a1a,#2d2d2d); --accent-gradient:linear-gradient(135deg,#6c6c6c,#8a8a8a); }
        body { background: var(--primary); min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: var(--primary); }
        .bg-image { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; transform: translateY(0); transition: transform 0.1s linear; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); pointer-events: none; transition: background-color 0.05s linear; }
        .mobile-menu-toggle { display: none; font-size: 1.8rem; color: var(--white); cursor: pointer; padding: 10px; margin: -10px; z-index: 1002; }
        header { background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-img { height: 50px; width: auto; border-radius: 8px; background: var(--white); padding: 3px; }
        .logo-text { display: flex; flex-direction: column; line-height: 1.2; }
        .logo-text .top { font-size: 1.2rem; font-weight: 600; color: var(--white); letter-spacing: 1px; }
        .logo-text .bottom { font-size: 1.8rem; font-weight: 700; color: var(--accent-light); letter-spacing: 2px; }
        .logo-text .ua { font-size: 0.9rem; color: var(--white); opacity: 0.8; margin-top: 2px; }
        .desktop-nav { display: flex; gap: 1rem; }
        .desktop-nav a { color: var(--white); text-decoration: none; font-weight: 500; font-size: 1rem; padding: 0.5rem 1rem; border-radius: 20px; transition: 0.3s; }
        .desktop-nav a:hover, .desktop-nav a.active { background: var(--accent); color: var(--white); }
        .mobile-nav { display: none; position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: var(--primary); z-index: 1001; padding: 2rem 1.5rem; transition: left 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.3); overflow-y: auto; }
        .mobile-nav.active { left: 0; }
        .mobile-nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .mobile-nav-header .logo-img { height: 40px; }
        .mobile-nav-close { color: var(--white); font-size: 2rem; cursor: pointer; padding: 5px; line-height: 1; }
        .mobile-nav a { display: block; color: var(--white); text-decoration: none; font-size: 1.1rem; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .mobile-nav a:hover, .mobile-nav a:active { color: var(--accent-light); padding-left: 10px; }
        .mobile-nav-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(3px); }
        .mobile-nav-overlay.active { display: block; }
        .auth-buttons { display: flex; gap: 0.5rem; }
        .auth-buttons button { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .auth-buttons button:hover { background: var(--accent); color: var(--white); }
        main { flex: 1; padding: 2rem 5%; position: relative; z-index: 1; }
        h1 { font-size: 2.2rem; margin-bottom: 1.5rem; color: var(--white); position: relative; padding-bottom: 0.5rem; }
        h1::after { content: ''; position: absolute; bottom: 0; left: 0; width: 60px; height: 3px; background: var(--accent); }
        h2 { font-size: 1.6rem; margin: 1.5rem 0 1rem; color: var(--white); }

        /* Стилі для класичної сітки (за замовчуванням) */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .product-card { background: rgba(45,45,45,0.95); backdrop-filter: blur(10px); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .product-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transition: left 0.5s; z-index: 1; pointer-events: none; }
        .product-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 30px rgba(0,0,0,0.4); border-color: var(--accent-light); }
        .product-card:hover::before { left: 100%; }
        .product-image { width: 100%; height: 200px; object-fit: cover; background: var(--secondary); transition: transform 0.5s; }
        .product-card:hover .product-image { transform: scale(1.05); }
        .product-info { padding: 1.5rem; position: relative; z-index: 2; }
        .product-info h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--white); line-height: 1.4; transition: color 0.2s; }
        .product-card:hover .product-info h3 { color: var(--accent-light); }
        .product-price { color: var(--accent-light); font-size: 1.6rem; font-weight: 700; margin: 0.5rem 0; }
        .product-category { font-size: 0.85rem; color: #aaa; background: rgba(255,255,255,0.1); display: inline-block; padding: 0.3rem 1rem; border-radius: 30px; margin-top: 0.5rem; }
        .order-btn-small { background: var(--accent-gradient); border: none; color: white; padding: 0.5rem 1rem; border-radius: 40px; font-size: 0.9rem; font-weight: 600; margin-top: 1rem; width: 100%; cursor: pointer; transition: all 0.2s; text-align: center; display: inline-block; text-decoration: none; }
        .order-btn-small:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.3); background: var(--accent-light); }

        /* Сучасна сітка (3D flip) */
        .products-grid-modern { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .product-card-modern { background: transparent; perspective: 1000px; cursor: pointer; height: 350px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 16px; }
        .product-card-modern:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; overflow: hidden; background: rgba(45,45,45,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-front { display: flex; align-items: center; justify-content: center; }
        .card-back { transform: rotateY(180deg); padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .product-image-modern { width: 100%; height: 100%; object-fit: cover; }

        /* Слайдер */
        .slider-container { position: relative; margin: 2rem 0; overflow: hidden; padding: 0 40px; }
        .slider-wrapper { overflow: hidden; }
        .slider-track { display: flex; transition: transform 0.3s ease; }
        .slider-slide { flex: 0 0 calc(100% / 3); padding: 0 10px; box-sizing: border-box; }
        @media (max-width: 1024px) { .slider-slide { flex: 0 0 50%; } }
        @media (max-width: 768px) { .slider-slide { flex: 0 0 100%; } }
        .product-card-slider { background: rgba(45,45,45,0.95); backdrop-filter: blur(10px); border-radius: 20px; overflow: hidden; text-align: center; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; height: 100%; }
        .product-card-slider:hover { transform: translateY(-5px); border-color: var(--accent-light); }
        .product-image-slider { width: 100%; height: 200px; object-fit: contain; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 1rem; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .slider-btn:hover { background: var(--accent); }
        .slider-btn.prev { left: 0; }
        .slider-btn.next { right: 0; }

        /* Бренд-лого – збільшене до 1000px */
        .hero-banner { width: 100%; margin-bottom: 2rem; border-radius: 30px; overflow: hidden; box-shadow: var(--shadow); background: var(--secondary); }
        .hero-banner img { width: 100%; height: auto; max-height: 500px; object-fit: cover; display: block; }
        .brand-logo-container { text-align: center; margin-bottom: 2rem; }
        .brand-logo-container img { width: 100%; height: auto; max-width: 1000px; display: inline-block; border-radius: 20px; transition: transform 0.3s; }
        .brand-logo-container img:hover { transform: scale(1.02); }

        /* Інші стилі (залишаються без змін) */
        .about-hero { background: rgba(26,26,26,0.8); backdrop-filter: blur(10px); color: var(--white); padding: 4rem 2rem; border-radius: 30px; margin-bottom: 3rem; text-align: center; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.1); }
        .about-hero h1 { color: var(--white); font-size: 3rem; margin-bottom: 1rem; }
        .about-hero h1::after { background: var(--accent); left: 50%; transform: translateX(-50%); width: 100px; }
        .about-hero p { font-size: 1.2rem; max-width: 800px; margin: 0 auto; opacity: 0.9; }
        .about-content { background: rgba(45,45,45,0.95); backdrop-filter: blur(10px); padding: 3rem; border-radius: 30px; box-shadow: var(--shadow); line-height: 1.8; color: var(--text); margin-bottom: 3rem; border: 1px solid rgba(255,255,255,0.1); }
        .about-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 2rem; margin: 3rem 0; }
        .feature-item { text-align: center; padding: 2rem; background: rgba(26,26,26,0.8); border-radius: 20px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .feature-item:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--accent); }
        .feature-item i { font-size: 3rem; color: var(--accent-light); margin-bottom: 1rem; }
        .feature-item h3 { font-size: 1.3rem; color: var(--white); margin-bottom: 0.5rem; }
        .feature-item p { color: #aaa; }
        .product-page { background: rgba(45,45,45,0.95); backdrop-filter: blur(10px); border-radius: 30px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.1); }
        .product-page-image { width: 100%; height: 400px; object-fit: cover; }
        .product-page-info { padding: 2.5rem; }
        .product-page-info h1 { font-size: 2.2rem; margin-bottom: 1rem; }
        .product-page-price { font-size: 2.5rem; color: var(--accent-light); font-weight: 700; margin-bottom: 1.5rem; }
        .variants h3 { font-size: 1.2rem; margin-bottom: 1rem; color: var(--white); }
        .variant-options { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .variant-btn { padding: 0.8rem 1.5rem; border: 2px solid rgba(255,255,255,0.2); border-radius: 30px; background: transparent; font-size: 1rem; font-weight: 500; cursor: pointer; transition: 0.3s; color: var(--white); }
        .variant-btn:hover { border-color: var(--accent); color: var(--accent-light); }
        .variant-btn.selected { background: var(--accent); color: var(--white); border-color: var(--accent); }
        .order-form { background: rgba(26,26,26,0.8); padding: 2rem; border-radius: 20px; margin-top: 2rem; }
        .order-form h3 { margin-bottom: 1rem; color: var(--white); }
        .order-form input { width: 100%; padding: 1rem; margin: 0.5rem 0; border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; font-size: 1rem; background: rgba(0,0,0,0.5); color: var(--white); }
        .order-form input:focus { outline: none; border-color: var(--accent); }
        .order-btn { background: var(--accent-gradient); color: var(--white); border: none; padding: 1rem; width: 100%; border-radius: 30px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .order-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .contact-content { background: rgba(45,45,45,0.95); backdrop-filter: blur(10px); padding: 3rem; border-radius: 30px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.1); }
        .contact-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 2rem; margin: 2rem 0; }
        .contact-item { display: flex; align-items: center; gap: 1rem; padding: 1.5rem; background: rgba(26,26,26,0.8); border-radius: 16px; transition: 0.3s; }
        .contact-item i { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: var(--accent); color: var(--white); border-radius: 50%; font-size: 1.3rem; }
        .contact-item div { flex: 1; }
        .contact-item h3 { font-size: 0.9rem; color: #aaa; margin-bottom: 0.3rem; }
        .contact-item p { font-size: 1.1rem; font-weight: 600; color: var(--white); }
        .social-section { margin-top: 3rem; padding-top: 2rem; border-top: 2px solid rgba(255,255,255,0.1); }
        .social-section h3 { font-size: 1.3rem; margin-bottom: 1.5rem; color: var(--white); }
        .social-links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .social-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1.5rem; background: rgba(26,26,26,0.8); border-radius: 50px; text-decoration: none; color: var(--white); font-weight: 500; transition: 0.3s; min-width: 140px; }
        .social-link i { font-size: 1.4rem; }
        .social-link.telegram i { color: #0088cc; }
        .social-link.instagram i { color: #e4405f; }
        .social-link.facebook i { color: #1877f2; }
        .social-link.viber i { color: #665cac; }
        .social-link.whatsapp i { color: #25D366; }
        .social-link:hover { background: var(--accent); color: var(--white); }
        .social-link:hover i { color: var(--white); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: flex-end; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--secondary); padding: 2rem 1.5rem; border-radius: 30px 30px 0 0; width: 100%; max-width: 500px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-content h2 { margin-bottom: 1.5rem; color: var(--white); }
        .modal-content input { width: 100%; padding: 1rem; margin: 0.5rem 0; border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; background: rgba(0,0,0,0.5); color: var(--white); }
        .modal-content button { background: var(--accent); color: var(--white); border: none; padding: 1rem; width: 100%; border-radius: 30px; font-weight: 600; font-size: 1.1rem; margin-top: 1rem; cursor: pointer; }
        .close { float: right; font-size: 2rem; cursor: pointer; color: #aaa; }
        .close:hover { color: var(--white); }
        footer { background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); color: var(--white); text-align: center; padding: 2rem; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); }
        @media (max-width: 768px) { .desktop-nav { display: none; } .mobile-menu-toggle { display: block; } .mobile-nav { display: block; } .logo-img { height: 40px; } .logo-text .top { font-size: 1rem; } .logo-text .bottom { font-size: 1.4rem; } .auth-buttons button { padding: 0.4rem 0.8rem; font-size: 0.85rem; } .products-grid, .products-grid-modern { grid-template-columns: repeat(2,1fr); gap: 1rem; } .product-page-image { height: 250px; } .about-hero { padding: 2rem 1rem; } .about-hero h1 { font-size: 2rem; } .about-content { padding: 1.5rem; } .brand-logo-container img { max-width: 100%; } }
        @media (max-width: 480px) { .logo-img { height: 35px; } .logo-text .top { font-size: 0.9rem; } .logo-text .bottom { font-size: 1.2rem; } .products-grid, .products-grid-modern { grid-template-columns: 1fr; } .auth-buttons button { padding: 0.3rem 0.6rem; font-size: 0.8rem; } .auth-buttons button i { margin-right: 0; } .auth-buttons button span { display: none; } .brand-logo-container img { max-width: 100%; } }
        button, .product-card, .product-card-modern, .variant-btn, .order-btn, .auth-buttons button, .mobile-menu-toggle, .mobile-nav-close, .social-link { touch-action: manipulation; -webkit-tap-highlight-color: transparent; cursor: pointer; }
        body { overscroll-behavior-y: contain; }
    </style>
</head>
<body>
    <div class="bg-container" id="bgContainer">
        <img src="" alt="Фон" class="bg-image" id="bgImage" style="display: none;">
        <div class="bg-overlay" id="bgOverlay"></div>
    </div>
    <header>
        <div class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></div>
        <a href="/" class="logo">
            <img src="" alt="Логотип" class="logo-img" id="headerLogo" style="display: none;">
            <div class="logo-text"><span class="top">ЗАХІД</span><span class="bottom">ДРОН</span><span class="ua">UA</span></div>
        </a>
        <nav class="desktop-nav">
            <a href="/">Головна</a>
            <a href="/catalog">Каталог</a>
            <a href="/about">Про нас</a>
            <a href="/contacts">Контакти</a>
        </nav>
        <div class="auth-buttons">
            <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> <span>Вхід</span></button>
            <button id="registerBtn"><i class="fas fa-user-plus"></i> <span>Реєстрація</span></button>
        </div>
    </header>
    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
    <div class="mobile-nav" id="mobileNav">
        <div class="mobile-nav-header">
            <img src="" alt="Логотип" class="logo-img" id="mobileLogo" style="display: none;">
            <span class="mobile-nav-close" id="mobileNavClose">&times;</span>
        </div>
        <a href="/" class="mobile-nav-link">Головна</a>
        <a href="/catalog" class="mobile-nav-link">Каталог</a>
        <a href="/about" class="mobile-nav-link">Про нас</a>
        <a href="/contacts" class="mobile-nav-link">Контакти</a>
    </div>
    <main id="main-content"></main>
    <footer><p>&copy; 2024 Захід Дрон. Всі права захищені.</p></footer>
    <div id="loginModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('loginModal')">&times;</span><h2>Вхід</h2><input type="text" id="loginUsername" placeholder="Логін"><input type="password" id="loginPassword" placeholder="Пароль"><button onclick="login()">Увійти</button></div></div>
    <div id="registerModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('registerModal')">&times;</span><h2>Реєстрація</h2><input type="text" id="regUsername" placeholder="Логін"><input type="password" id="regPassword" placeholder="Пароль"><button onclick="register()">Зареєструватися</button></div></div>
    <script>
        let currentUser = null, categories = [], products = [], aboutText = '', contactInfo = '', socialLinks = [], bannerImage = '', brandLogoImage = '', backgroundImage = '', currentDisplayStyle = 'classic';
        let currentSlideIndex = 0, slidesPerView = 3, totalSlides = 0;

        function initMobileMenu() {
            const toggle = document.getElementById('mobileMenuToggle');
            const close = document.getElementById('mobileNavClose');
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            if (!toggle || !close || !nav || !overlay) return;
            function open() { nav.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
            function closeMenu() { nav.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
            toggle.addEventListener('click', e => { e.stopPropagation(); open(); });
            close.addEventListener('click', closeMenu);
            overlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.mobile-nav-link').forEach(l => l.addEventListener('click', closeMenu));
            nav.addEventListener('click', e => e.stopPropagation());
        }

        function initParallax() {
            const bgImage = document.getElementById('bgImage');
            const bgOverlay = document.getElementById('bgOverlay');
            window.addEventListener('scroll', () => {
                const bgContainer = document.getElementById('bgContainer');
                if (bgContainer && bgImage && bgImage.style.display !== 'none') {
                    const scrollY = window.scrollY;
                    bgImage.style.transform = `translateY(${scrollY * 0.3}px)`;
                    if (bgOverlay) {
                        let opacity = Math.min(scrollY / 400, 0.6);
                        bgOverlay.style.backgroundColor = `rgba(0,0,0,${opacity})`;
                    }
                }
            });
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                currentDisplayStyle = settings.product_display_style || 'classic';
            } catch(e) { currentDisplayStyle = 'classic'; }
        }

        async function loadLogo() { try { const r = await fetch('/api/logo'); if(r.ok){ const url = await r.text(); if(url){ document.getElementById('headerLogo').src = url; document.getElementById('headerLogo').style.display = 'block'; document.getElementById('mobileLogo').src = url; document.getElementById('mobileLogo').style.display = 'block'; } } } catch(e){} }
        async function loadBanner() { try { const r = await fetch('/api/banner'); if(r.ok){ const url = await r.text(); if(url) bannerImage = url; } } catch(e){} }
        async function loadBrandLogo() { try { const r = await fetch('/api/brand-logo'); if(r.ok){ const url = await r.text(); if(url) brandLogoImage = url; } } catch(e){} }
        async function loadBackground() { try { const r = await fetch('/api/background'); if(r.ok){ const url = await r.text(); if(url){ backgroundImage = url; document.getElementById('bgImage').src = url; document.getElementById('bgImage').style.display = 'block'; } } } catch(e){} }

        async function loadData() {
            try {
                const [cRes, pRes, aRes, coRes, uRes, sRes] = await Promise.all([
                    fetch('/api/categories'), fetch('/api/products'), fetch('/api/about'), fetch('/api/contact'),
                    fetch('/api/user').catch(()=>null), fetch('/api/social').catch(()=>({json:()=>[]}))
                ]);
                categories = await cRes.json();
                products = await pRes.json();
                aboutText = await aRes.text();
                contactInfo = await coRes.text();
                socialLinks = await sRes.json();
                if(uRes && uRes.ok) currentUser = await uRes.json();
                await loadLogo(); await loadBanner(); await loadBrandLogo(); await loadBackground();
                await loadSettings();
            } catch(e){ console.error(e); }
        }

        async function renderPage() {
            await loadData();
            const path = window.location.pathname;
            const main = document.getElementById('main-content');
            document.querySelectorAll('.desktop-nav a, .mobile-nav-link').forEach(link => {
                link.classList.remove('active');
                if(link.getAttribute('href') === path || (path === '/' && link.getAttribute('href') === '/about')) link.classList.add('active');
            });
            if(path === '/' || path === '/about') renderAbout(main);
            else if(path === '/catalog') renderCatalog(main);
            else if(path === '/contacts') renderContacts(main);
            else if(path.startsWith('/product/')) renderProductPage(main, path.split('/')[2]);
        }

        function renderAbout(main) {
            const bannerHtml = bannerImage ? `<div class="hero-banner"><img src="${bannerImage}" alt="Банер"></div>` : '';
            const brandHtml = brandLogoImage ? `<div class="brand-logo-container"><img src="${brandLogoImage}" alt="Бренд-лого"></div>` : '';
            main.innerHTML = `
                ${bannerHtml}
                <div style="margin-top: 2rem;">
                    ${brandHtml}
                    <div class="about-hero">
                        <h1>Про нас</h1>
                        <p>Ваш надійний партнер у світі дронів та комплектуючих</p>
                    </div>
                </div>
                <div class="about-content">${aboutText.replace(/\n/g, '<br>')}</div>
                <div class="about-features">
                    <div class="feature-item"><i class="fas fa-shield-alt"></i><h3>Гарантія якості</h3><p>Всі товари мають офіційну гарантію</p></div>
                    <div class="feature-item"><i class="fas fa-headset"></i><h3>Підтримка 24/7</h3><p>Завжди готові допомогти з вибором</p></div>
                </div>
                <div class="social-section">
                    <h3>Ми в соціальних мережах</h3>
                    <div class="social-links">${socialLinks.map(s => `<a href="${s.url}" target="_blank" class="social-link ${s.platform}"><i class="${s.icon}"></i><span>${s.name}</span></a>`).join('')}</div>
                </div>
            `;
        }

        function renderCatalog(main) {
            let html = '<h1>Каталог товарів</h1>';
            if (!products.length) {
                html += '<p style="text-align:center;padding:3rem;color:#aaa;">Товари поки відсутні</p>';
                main.innerHTML = html;
                return;
            }

            if (currentDisplayStyle === 'slider') {
                // Горизонтальний слайдер
                html += '<div class="slider-container">';
                html += '<button class="slider-btn prev" onclick="slideProducts(-1)"><i class="fas fa-chevron-left"></i></button>';
                html += '<div class="slider-wrapper"><div class="slider-track" id="sliderTrack">';
                categories.forEach(cat => {
                    const catProds = products.filter(p => p.category === cat);
                    catProds.forEach(p => {
                        html += `<div class="slider-slide">
                            <div class="product-card-slider" data-id="${p.id}">
                                <img src="${p.image || 'data:image/svg+xml,%3Csvg...%3E'}" class="product-image-slider" loading="lazy">
                                <div class="product-info-slider">
                                    <h3>${p.name}</h3>
                                    <div class="product-price">${p.price.toLocaleString()} грн</div>
                                    <span class="product-category">${p.category}</span>
                                    <button class="order-btn-small" onclick="event.stopPropagation(); location.href='/product/${p.id}'">Детальніше</button>
                                </div>
                            </div>
                        </div>`;
                    });
                });
                html += '</div></div>';
                html += '<button class="slider-btn next" onclick="slideProducts(1)"><i class="fas fa-chevron-right"></i></button>';
                html += '</div>';
                main.innerHTML = html;
                initSlider();
                // Додаємо обробник кліку на картку
                document.querySelectorAll('.product-card-slider').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const id = card.getAttribute('data-id');
                        if(id) location.href = `/product/${id}`;
                    });
                });
            } 
            else if (currentDisplayStyle === 'modern') {
                // Сучасна сітка з 3D-ефектом
                categories.forEach(cat => {
                    const catProds = products.filter(p => p.category === cat);
                    if (catProds.length) {
                        html += `<h2>${cat}</h2><div class="products-grid-modern">`;
                        catProds.forEach(p => {
                            html += `<div class="product-card-modern" data-id="${p.id}">
                                <div class="card-inner">
                                    <div class="card-front">
                                        <img src="${p.image || 'data:image/svg+xml,%3Csvg...%3E'}" class="product-image-modern" loading="lazy">
                                    </div>
                                    <div class="card-back">
                                        <h3>${p.name}</h3>
                                        <div class="product-price">${p.price.toLocaleString()} грн</div>
                                        <span class="product-category">${p.category}</span>
                                        <button class="order-btn-small" onclick="event.stopPropagation(); location.href='/product/${p.id}'">Детальніше</button>
                                    </div>
                                </div>
                            </div>`;
                        });
                        html += '</div>';
                    }
                });
                main.innerHTML = html;
                document.querySelectorAll('.product-card-modern').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const id = card.getAttribute('data-id');
                        if(id) location.href = `/product/${id}`;
                    });
                });
            } 
            else {
                // Класична сітка (за замовчуванням)
                categories.forEach(cat => {
                    const catProds = products.filter(p => p.category === cat);
                    if (catProds.length) {
                        html += `<h2>${cat}</h2><div class="products-grid">`;
                        catProds.forEach(p => {
                            html += `<div class="product-card" data-id="${p.id}">
                                <img src="${p.image || 'data:image/svg+xml,%3Csvg...%3E'}" class="product-image" loading="lazy">
                                <div class="product-info">
                                    <h3>${p.name}</h3>
                                    <div class="product-price">${p.price.toLocaleString()} грн</div>
                                    <span class="product-category">${p.category}</span>
                                    <button class="order-btn-small" onclick="event.stopPropagation(); location.href='/product/${p.id}'">Детальніше</button>
                                </div>
                            </div>`;
                        });
                        html += '</div>';
                    }
                });
                main.innerHTML = html;
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const id = card.getAttribute('data-id');
                        if(id) location.href = `/product/${id}`;
                    });
                });
            }
        }

        function renderContacts(main) {
            const lines = contactInfo.split('\n');
            main.innerHTML = `<h1>Контакти</h1><div class="contact-content"><div class="contact-info">${lines.map(l => {
                if(l.includes('@')) return `<div class="contact-item"><i class="fas fa-envelope"></i><div><h3>Email</h3><p>${l.replace('Email:','').trim()}</p></div></div>`;
                if(l.includes('+380')||l.includes('Телефон')) return `<div class="contact-item"><i class="fas fa-phone"></i><div><h3>Телефон</h3><p>${l.replace('Телефон:','').trim()}</p></div></div>`;
                if(l.includes('Графік')) return `<div class="contact-item"><i class="fas fa-clock"></i><div><h3>Графік</h3><p>${l.replace('Графік:','').trim()}</p></div></div>`;
                if(l.includes('Адреса')) return `<div class="contact-item"><i class="fas fa-map-marker-alt"></i><div><h3>Адреса</h3><p>${l.replace('Адреса:','').trim()}</p></div></div>`;
                return '';
            }).join('')}</div><div class="social-section"><h3>Напишіть нам</h3><div class="social-links">${socialLinks.map(s => `<a href="${s.url}" target="_blank" class="social-link ${s.platform}"><i class="${s.icon}"></i><span>${s.name}</span></a>`).join('')}</div></div></div>`;
        }

        function renderProductPage(main, id) {
            const p = products.find(p => p.id == id);
            if(!p){ main.innerHTML = '<h1>Товар не знайдено</h1>'; return; }
            main.innerHTML = `<div class="product-page"><img src="${p.image||'data:image/svg+xml,%3Csvg...%3E'}" class="product-page-image"><div class="product-page-info"><h1>${p.name}</h1><div class="product-page-price">${p.price.toLocaleString()} грн</div><p style="color:#aaa;line-height:1.8;">${p.description||'Опис відсутній'}</p><div class="variants"><h3>Варіанти:</h3><div class="variant-options">${p.variants.map(v=>`<button class="variant-btn" onclick="selectVariant(this,'${v}')">${v}</button>`).join('')}</div></div><div class="order-form"><h3>Замовити:</h3><input type="text" id="orderName" placeholder="Ваше ім'я"><input type="tel" id="orderPhone" placeholder="Номер телефону"><input type="text" id="orderVariant" placeholder="Оберіть варіант" readonly><button class="order-btn" onclick="placeOrder(${p.id})"><i class="fas fa-shopping-cart"></i> Замовити</button></div></div></div>`;
        }

        // Функції для слайдера
        function initSlider() {
            const track = document.getElementById('sliderTrack');
            if (!track) return;
            const slides = track.children;
            totalSlides = slides.length;
            updateSlidesPerView();
            window.addEventListener('resize', updateSlidesPerView);
        }

        function updateSlidesPerView() {
            if (window.innerWidth < 768) slidesPerView = 1;
            else if (window.innerWidth < 1024) slidesPerView = 2;
            else slidesPerView = 3;
            updateSlider();
        }

        function updateSlider() {
            const track = document.getElementById('sliderTrack');
            if (!track) return;
            const slideWidth = track.children[0]?.offsetWidth || 0;
            const newTransform = -currentSlideIndex * slideWidth;
            track.style.transform = `translateX(${newTransform}px)`;
            const prevBtn = document.querySelector('.slider-btn.prev');
            const nextBtn = document.querySelector('.slider-btn.next');
            if (prevBtn) prevBtn.style.display = currentSlideIndex <= 0 ? 'none' : 'flex';
            if (nextBtn) nextBtn.style.display = currentSlideIndex >= totalSlides - slidesPerView ? 'none' : 'flex';
        }

        window.slideProducts = function(direction) {
            const track = document.getElementById('sliderTrack');
            if (!track) return;
            const slides = track.children;
            totalSlides = slides.length;
            const maxIndex = totalSlides - slidesPerView;
            let newIndex = currentSlideIndex + direction;
            if (newIndex < 0) newIndex = 0;
            if (newIndex > maxIndex) newIndex = maxIndex;
            if (newIndex !== currentSlideIndex) {
                currentSlideIndex = newIndex;
                updateSlider();
            }
        };

        window.selectVariant = (btn, v) => { document.querySelectorAll('.variant-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); document.getElementById('orderVariant').value = v; };
        window.placeOrder = async (id) => {
            const name = document.getElementById('orderName').value, phone = document.getElementById('orderPhone').value, variant = document.getElementById('orderVariant').value;
            if(!name||!phone||!variant) return alert('Заповніть всі поля');
            const res = await fetch('/api/orders', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productId:id,name,phone,variant})});
            if(res.ok) { alert('Дякуємо! Замовлення прийнято.'); location.href='/'; }
            else alert('Помилка');
        };
        window.login = async () => {
            const u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            if(res.ok){ const user=await res.json(); closeModal('loginModal'); if(user.isAdmin) location.href='/admin'; else location.reload(); }
            else alert('Невірний логін або пароль');
        };
        window.register = async () => {
            const u = document.getElementById('regUsername').value, p = document.getElementById('regPassword').value;
            if(!u||!p) return alert('Заповніть всі поля');
            const res = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            if(res.ok){ alert('Реєстрація успішна! Увійдіть.'); closeModal('registerModal'); }
            else alert('Користувач вже існує');
        };
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.addEventListener('popstate', renderPage);
        document.querySelectorAll('.desktop-nav a, .mobile-nav-link').forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); const href = link.getAttribute('href'); history.pushState({},'',href); renderPage(); }));
        document.getElementById('loginBtn').onclick = () => document.getElementById('loginModal').classList.add('active');
        document.getElementById('registerBtn').onclick = () => document.getElementById('registerModal').classList.add('active');
        document.addEventListener('DOMContentLoaded', () => { initMobileMenu(); initParallax(); renderPage(); });
        renderPage();
    </script>
</body>
</html>
