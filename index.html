<!-- index.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Захід Дрон | Магазин дронів та реб</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        :root {
            --primary: #0f172a;
            --accent: #f97316;
            --light: #f8fafc;
            --text: #1e293b;
            --white: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            --gradient: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
        }

        body {
            background: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--primary);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 700;
            text-decoration: none;
        }

        .logo i {
            color: var(--accent);
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(249,115,22,0.3));
        }

        .logo span:first-child {
            color: var(--white);
        }

        .logo span:last-child {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 30px;
        }

        nav a:hover, nav a.active {
            background: var(--accent);
            color: var(--white);
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
        }

        .auth-buttons button {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-buttons button:hover {
            background: var(--accent);
            color: var(--white);
            transform: translateY(-2px);
        }

        /* Main content */
        main {
            flex: 1;
            padding: 3rem 5%;
        }

        /* Products grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px -10px rgba(249,115,22,0.2);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: linear-gradient(45deg, #f1f5f9, #e2e8f0);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-info h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .product-price {
            color: var(--accent);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .product-category {
            color: #64748b;
            font-size: 0.9rem;
            margin: 0.5rem 0;
            display: inline-block;
            padding: 0.3rem 1rem;
            background: #f1f5f9;
            border-radius: 30px;
        }

        /* Product page */
        .product-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            background: var(--white);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: var(--shadow);
        }

        .product-page-image {
            width: 100%;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .product-page-info h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .product-page-price {
            font-size: 3rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .variants {
            margin: 2rem 0;
        }

        .variants h3 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .variant-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .variant-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            background: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .variant-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .variant-btn.selected {
            background: var(--accent);
            color: var(--white);
            border-color: var(--accent);
        }

        .order-form {
            margin-top: 2rem;
            background: #f8fafc;
            padding: 2rem;
            border-radius: 20px;
        }

        .order-form h3 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .order-form input {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .order-form input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .order-btn {
            background: var(--gradient);
            color: var(--white);
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .order-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(249,115,22,0.4);
        }

        /* About & Contacts pages */
        .about-content, .contact-content {
            background: var(--white);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .contact-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .contact-item {
            background: #f8fafc;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
        }

        .contact-item i {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .modal-content input {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 1rem;
        }

        .modal-content button {
            background: var(--gradient);
            color: var(--white);
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1.1rem;
        }

        .close {
            float: right;
            font-size: 2rem;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.3s;
        }

        .close:hover {
            color: var(--accent);
        }

        /* Footer */
        footer {
            background: var(--primary);
            color: var(--white);
            text-align: center;
            padding: 2rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
            }
            
            .product-page {
                grid-template-columns: 1fr;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <i class="fas fa-drone"></i>
            <span>ЗАХІД</span>
            <span>ДРОН</span>
        </a>
        <nav>
            <a href="/">Головна</a>
            <a href="/catalog">Каталог</a>
            <a href="/about">Про нас</a>
            <a href="/contacts">Контакти</a>
        </nav>
        <div class="auth-buttons">
            <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Вхід</button>
            <button id="registerBtn"><i class="fas fa-user-plus"></i> Реєстрація</button>
        </div>
    </header>

    <main id="main-content">
        <!-- Контент завантажується динамічно -->
    </main>

    <footer>
        <p>&copy; 2026 Захід Дрон. Всі права захищені.</p>
    </footer>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Вхід</h2>
            <input type="text" id="loginUsername" placeholder="Логін">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Увійти</button>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2>Реєстрація</h2>
            <input type="text" id="regUsername" placeholder="Логін">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зареєструватися</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let categories = [];
        let products = [];
        let aboutText = '';
        let contactInfo = '';

        async function loadData() {
            try {
                const [categoriesRes, productsRes, aboutRes, contactRes, userRes] = await Promise.all([
                    fetch('/api/categories'),
                    fetch('/api/products'),
                    fetch('/api/about'),
                    fetch('/api/contact'),
                    fetch('/api/user').catch(() => null)
                ]);
                
                categories = await categoriesRes.json();
                products = await productsRes.json();
                aboutText = await aboutRes.text();
                contactInfo = await contactRes.text();
                
                if (userRes && userRes.ok) {
                    currentUser = await userRes.json();
                }
            } catch (error) {
                console.error('Помилка завантаження даних:', error);
            }
        }

        async function renderPage() {
            await loadData();
            
            const path = window.location.pathname;
            const main = document.getElementById('main-content');
            
            // Highlight active nav link
            document.querySelectorAll('nav a').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) {
                    link.classList.add('active');
                }
            });
            
            if (path === '/' || path === '/catalog') {
                renderCatalog(main);
            } else if (path === '/about') {
                renderAbout(main);
            } else if (path === '/contacts') {
                renderContacts(main);
            } else if (path.startsWith('/product/')) {
                const productId = path.split('/')[2];
                renderProductPage(main, productId);
            }
        }

        function renderCatalog(main) {
            let html = '<h1>Каталог товарів</h1>';
            
            categories.forEach(cat => {
                const catProducts = products.filter(p => p.category === cat);
                if (catProducts.length > 0) {
                    html += `<h2 style="margin-top: 2rem;">${cat}</h2>`;
                    html += '<div class="products-grid">';
                    
                    catProducts.forEach(p => {
                        html += `
                            <div class="product-card" onclick="window.location.href='/product/${p.id}'">
                                <img src="${p.image || 'https://via.placeholder.com/300x250?text=Немає+фото'}" alt="${p.name}" class="product-image">
                                <div class="product-info">
                                    <h3>${p.name}</h3>
                                    <div class="product-price">${p.price} грн</div>
                                    <span class="product-category">${p.category}</span>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                }
            });
            
            main.innerHTML = html;
        }

        function renderAbout(main) {
            main.innerHTML = `
                <h1>Про нас</h1>
                <div class="about-content">
                    ${aboutText.replace(/\n/g, '<br>')}
                </div>
            `;
        }

        function renderContacts(main) {
            const lines = contactInfo.split('\n');
            
            main.innerHTML = `
                <h1>Контакти</h1>
                <div class="contact-info">
                    ${lines.map(line => {
                        if (line.includes('@')) {
                            return `<div class="contact-item"><i class="fas fa-envelope"></i><h3>Email</h3><p>${line}</p></div>`;
                        } else if (line.includes('+380') || line.includes('телефон')) {
                            return `<div class="contact-item"><i class="fas fa-phone"></i><h3>Телефон</h3><p>${line}</p></div>`;
                        } else {
                            return `<div class="contact-item"><i class="fas fa-clock"></i><h3>Графік</h3><p>${line}</p></div>`;
                        }
                    }).join('')}
                </div>
            `;
        }

        function renderProductPage(main, productId) {
            const product = products.find(p => p.id == productId);
            if (!product) {
                main.innerHTML = '<h1>Товар не знайдено</h1>';
                return;
            }

            main.innerHTML = `
                <div class="product-page">
                    <img src="${product.image || 'https://via.placeholder.com/600x400?text=Немає+фото'}" alt="${product.name}" class="product-page-image">
                    <div class="product-page-info">
                        <h1>${product.name}</h1>
                        <div class="product-page-price">${product.price} грн</div>
                        <p style="color: #475569; line-height: 1.8;">${product.description || 'Опис товару відсутній'}</p>
                        
                        <div class="variants">
                            <h3>Варіанти:</h3>
                            <div class="variant-options" id="variantOptions">
                                ${product.variants.map(v => `
                                    <button class="variant-btn" onclick="selectVariant(this, '${v}')">${v}</button>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="order-form">
                            <h3>Замовити:</h3>
                            <input type="text" id="orderName" placeholder="Ваше ім'я">
                            <input type="tel" id="orderPhone" placeholder="Номер телефону">
                            <input type="text" id="orderVariant" placeholder="Обраний варіант" readonly>
                            <button class="order-btn" onclick="placeOrder(${product.id})">
                                <i class="fas fa-shopping-cart"></i> Оформити замовлення
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Глобальні функції
        window.selectVariant = function(btn, variant) {
            document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('orderVariant').value = variant;
        }

        window.placeOrder = async function(productId) {
            const name = document.getElementById('orderName').value;
            const phone = document.getElementById('orderPhone').value;
            const variant = document.getElementById('orderVariant').value;
            
            if (!name || !phone || !variant) {
                alert('Будь ласка, заповніть всі поля');
                return;
            }
            
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, name, phone, variant })
                });
                
                if (response.ok) {
                    alert('Дякуємо! Ваше замовлення прийнято. Ми скоро зв\'яжемося з вами.');
                    window.location.href = '/';
                }
            } catch (error) {
                alert('Помилка при оформленні замовлення');
            }
        }

        // Авторизація
        window.login = async function() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const user = await response.json();
                    currentUser = user;
                    closeModal('loginModal');
                    
                    if (user.isAdmin) {
                        window.location.href = '/admin';
                    } else {
                        window.location.reload();
                    }
                } else {
                    alert('Невірний логін або пароль');
                }
            } catch (error) {
                alert('Помилка при вході');
            }
        }

        window.register = async function() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            if (!username || !password) {
                alert('Заповніть всі поля');
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    alert('Реєстрація успішна! Тепер увійдіть.');
                    closeModal('registerModal');
                } else {
                    alert('Користувач вже існує');
                }
            } catch (error) {
                alert('Помилка при реєстрації');
            }
        }

        window.closeModal = function(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Обробка навігації
        window.addEventListener('popstate', () => renderPage());
        
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const href = link.getAttribute('href');
                window.history.pushState({}, '', href);
                renderPage();
            });
        });

        // Ініціалізація
        document.getElementById('loginBtn').onclick = () => document.getElementById('loginModal').classList.add('active');
        document.getElementById('registerBtn').onclick = () => document.getElementById('registerModal').classList.add('active');
        
        renderPage();
    </script>
</body>
</html>
